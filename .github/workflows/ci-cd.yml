name: Flowrage Automation CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  COMPOSE_PROFILE: cpu
  DEPLOY_PATH: /var/www/flowrage-automation

jobs:
  validate-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare local env file
        run: cp .env.example .env

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml --profile "$COMPOSE_PROFILE" config >/dev/null

  deploy-production:
    needs: validate-compose
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.DEPLOY_PATH }}"
            mkdir -p "${{ env.DEPLOY_PATH }}/n8n"

      - name: Copy Docker Compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.yml"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Copy demo data
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "n8n/demo-data"
          target: "${{ env.DEPLOY_PATH }}/n8n"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: DEPLOY_PATH,COMPOSE_PROFILE
          script: |
            set -e
            cd "${DEPLOY_PATH}"
            if [ ! -f ".env" ]; then
              echo "ERROR: .env file not found in ${DEPLOY_PATH}"
              exit 1
            fi

            N8N_PORT="$(grep -E '^N8N_PORT=' .env | cut -d= -f2- || true)"
            QDRANT_PORT="$(grep -E '^QDRANT_PORT=' .env | cut -d= -f2- || true)"
            OLLAMA_PORT="$(grep -E '^OLLAMA_PORT=' .env | cut -d= -f2- || true)"
            N8N_PORT="${N8N_PORT:-5678}"
            QDRANT_PORT="${QDRANT_PORT:-6333}"
            OLLAMA_PORT="${OLLAMA_PORT:-11434}"

            for port in "$N8N_PORT" "$QDRANT_PORT" "$OLLAMA_PORT"; do
              if ss -ltn "( sport = :$port )" | tail -n +2 | grep -q .; then
                echo "ERROR: port $port is already in use on the VPS"
                exit 1
              fi
            done

            docker compose -f docker-compose.yml --profile "${COMPOSE_PROFILE}" pull
            docker compose -f docker-compose.yml --profile "${COMPOSE_PROFILE}" up -d --remove-orphans
